name: HLOOMBERG Refresh

on:
  schedule:
    # KST 06:00-23:00 weekdays (UTC 21:00-14:00, Mon-Fri)
    # UTC Mon 21:00 = KST Tue 06:00 ... UTC Fri 14:00 = KST Fri 23:00
    - cron: '*/5 21-23 * * 0'
    - cron: '*/5 0-14  * * 1'
    - cron: '*/5 21-23 * * 1'
    - cron: '*/5 0-14  * * 2'
    - cron: '*/5 21-23 * * 2'
    - cron: '*/5 0-14  * * 3'
    - cron: '*/5 21-23 * * 3'
    - cron: '*/5 0-14  * * 4'
    - cron: '*/5 21-23 * * 4'
    - cron: '*/5 0-14  * * 5'
    # Stock analysis: KST 07:00 / 15:00 / 23:00 weekdays
    - cron: '0 22 * * 1-5'
    - cron: '0 6  * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'stock = stock analysis only, empty = full'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Restore KIS token cache
        uses: actions/cache@v5
        with:
          path: /tmp/kis_token.json
          key: kis-token-${{ github.repository }}
          restore-keys: kis-token-

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch & Patch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          STOCK_MODE: ${{ (github.event.schedule == '0 22 * * 1-5' || github.event.schedule == '0 6 * * 1-5' || github.event.schedule == '0 14 * * 1-5' || github.event.inputs.mode == 'stock') && '1' || '0' }}
        run: python refresh.py

      - name: Save KIS token cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: /tmp/kis_token.json
          key: kis-token-${{ github.repository }}
      - name: Commit & Push
        run: |
          git config user.name  "hloomberg-bot"
          git config user.email "bot@hloomberg"
          git add hloomberg.html
          git diff --cached --quiet || git commit -m "refresh $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
