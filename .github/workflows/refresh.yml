name: HLOOMBERG Refresh

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 22 * * *'
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'stock = stock analysis only, empty = full'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch & Patch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          STOCK_MODE: ${{ (github.event.schedule == '0 22 * * *' || github.event.schedule == '0 6 * * *' || github.event.schedule == '0 14 * * *' || github.event.inputs.mode == 'stock') && '1' || '0' }}
        run: python refresh.py

      - name: Commit & Push
        run: |
          git config user.name  "hloomberg-bot"
          git config user.email "bot@hloomberg"
          git add hloomberg.html
          git diff --cached --quiet || git commit -m "refresh $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
