name: HLOOMBERG Refresh

on:
  schedule:
    # ── 매 5분: KST 06:00-23:00 주중 (시세/뉴스/수급만)
    - cron: '*/5 21-23 * * 0'
    - cron: '*/5 0-14  * * 1'
    - cron: '*/5 21-23 * * 1'
    - cron: '*/5 0-14  * * 2'
    - cron: '*/5 21-23 * * 2'
    - cron: '*/5 0-14  * * 3'
    - cron: '*/5 21-23 * * 3'
    - cron: '*/5 0-14  * * 4'
    - cron: '*/5 21-23 * * 4'
    - cron: '*/5 0-14  * * 5'
    # ── KST 08:00 (UTC 23:00 전날): AI 전체 (이슈/원자재/TOP10/상세분석)
    - cron: '0 23 * * 0-4'
    # ── KST 20:00 (UTC 11:00): AI 부분 (종합분석/TOP10만)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'full=전체AI, partial=종합+TOP10, stock=상세분석, empty=시세/뉴스만'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore KIS token cache
        id: kis-cache
        uses: actions/cache@v5
        with:
          path: |
            /tmp/kis_token.json
            /tmp/tg_alert_cache.json
          key: kis-token-${{ github.repository }}
          restore-keys: kis-token-

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch & Patch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          # AI_PROVIDER: claude(기본) 또는 groq (refresh.py 서버사이드 AI 호출)
          AI_PROVIDER:        groq
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          BOK_API_KEY:        ${{ secrets.BOK_API_KEY }}
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          # AI_MODE: full=전체AI, partial=종합+TOP10, stock=상세분석만, ''=없음
          AI_MODE: >-
            ${{
              (github.event.schedule == '0 23 * * 0-4' || github.event.inputs.mode == 'full')    && 'full'    ||
              (github.event.schedule == '0 11 * * 1-5' || github.event.inputs.mode == 'partial') && 'partial' ||
              (github.event.inputs.mode == 'stock')                                               && 'stock'   ||
              (github.event_name == 'workflow_dispatch')                                          && 'full'    ||
              ''
            }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python refresh.py

      - name: Save KIS token cache
        uses: actions/cache/save@v5
        if: always() && steps.kis-cache.outputs.cache-hit != 'true'
        with:
          path: |
            /tmp/kis_token.json
            /tmp/tg_alert_cache.json
          key: kis-token-${{ github.repository }}

      - name: Commit & Push
        run: |
          git config user.name  "hloomberg-bot"
          git config user.email "bot@hloomberg"
          git add hloomberg.html refresh.py
          git add .github/workflows/refresh.yml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "refresh $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
