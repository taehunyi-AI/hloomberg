name: HLOOMBERG Refresh

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch & Patch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python refresh.py

      - name: Deploy to gh-pages
        run: |
          git config user.name  "hloomberg-bot"
          git config user.email "bot@hloomberg"
          # gh-pages 브랜치로 패치된 파일만 배포 (main에는 키 없는 원본 유지)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-tmp
          git reset
          cp hloomberg.html index.html
          git add index.html
          git commit -m "refresh $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push origin gh-pages-tmp:gh-pages --force
